<div class="stage-countdown" id="stage-countdown">
    <span class="stage-countdown__text">
        🏆 Stage Countdown: <strong class="stage-countdown__days" id="stage-days">--</strong> Days Out 🏆
    </span>
    <button class="stage-countdown__close" id="stage-countdown-close" aria-label="Hide banner">&times;</button>
</div>

<script>
    (function () {
        const banner = document.getElementById('stage-countdown');

        // Check if banner was dismissed this session
        if (sessionStorage.getItem('stageCountdownHidden') === 'true') {
            if (banner) banner.style.display = 'none';
            return;
        }

        // Calculate days until show
        const showDate = new Date(2026, 6, 19); // July 19, 2026 (local time)
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const diffTime = showDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        const daysEl = document.getElementById('stage-days');
        if (daysEl && diffDays > 0) {
            daysEl.textContent = diffDays;
        } else if (daysEl) {
            daysEl.textContent = '0';
        }

        // Handle close button
        const closeBtn = document.getElementById('stage-countdown-close');
        if (closeBtn && banner) {
            closeBtn.addEventListener('click', function () {
                banner.style.display = 'none';
                sessionStorage.setItem('stageCountdownHidden', 'true');
            });
        }
    })();
</script>
